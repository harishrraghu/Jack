name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

# Cancel any in-progress run for the same branch/PR.
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jack-backend

jobs:
  # ── CI: lint + import check ──────────────────────────────────────────────────
  ci:
    name: Lint & verify
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # gcc / build-essential are needed to compile `ta`, `asyncpg`, etc.
      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential gcc libgomp1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/

      - name: Check imports & app startup
        # Verifies the app can be imported without errors.
        # USE_SQLITE_FALLBACK avoids needing a real PostgreSQL instance.
        env:
          USE_SQLITE_FALLBACK: "true"
        run: python -c "from app.main import app; print('Import OK')"

  # ── Docker: build & push to GHCR (main branch only) ─────────────────────────
  docker:
    name: Build & push Docker image
    needs: ci
    runs-on: ubuntu-latest
    # Only publish images on pushes to main (not PRs).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs to speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
