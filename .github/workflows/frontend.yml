name: Frontend CI / GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

# Cancel any in-progress run for the same branch/PR.
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── CI: lint + type-check + build ───────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    # Pages deployment needs these write permissions.
    # They are harmless on PRs (deploy job is skipped on PRs anyway).
    permissions:
      contents: read
      pages: write
      id-token: write

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      # Configure Pages so Next.js knows the correct basePath automatically.
      # On PRs this step is a no-op (pages environment doesn't exist yet).
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v4
        # Don't fail PRs if Pages is not yet enabled in repo settings.
        continue-on-error: true

      - name: Build (static export)
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Use the base path GitHub Pages provides (e.g. /Jack).
          # Falls back to "" when building a PR or before Pages is enabled.
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path || '' }}
          # Point to your live backend (set BACKEND_URL in repo → Settings →
          # Variables → Actions).  Falls back to localhost for PR builds.
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.BACKEND_URL || 'http://localhost:8000' }}
        run: npm run build

      # Upload the `out/` directory as the Pages artifact (main branch only).
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  # ── Deploy to GitHub Pages (main branch only) ────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
