services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      USE_SQLITE_FALLBACK: "true"
      # Uncomment + set the vars below to use a real PostgreSQL instance instead:
      # USE_SQLITE_FALLBACK: "false"
      # DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/banknifty"
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      # Mount data directory so CSVs persist across container restarts.
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Tells the Next.js build where the backend lives at runtime.
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

